services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: whaticket
      POSTGRES_PASSWORD: whaticket
      POSTGRES_DB: whaticket
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whaticket"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: whaticket
      RABBITMQ_DEFAULT_PASS: whaticket
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/whaticket-media || true &&
      mc anonymous set download local/whaticket-media || true
      "

  migrate:
    build:
      context: ./backend-go
    image: whaticket-go-backend:local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://whaticket:whaticket@postgres:5432/whaticket?sslmode=disable
    entrypoint: ["/app/migrate"]
    command: ["up"]
    restart: "no"

  seed:
    profiles: ["seed"]
    image: whaticket-go-backend:local
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://whaticket:whaticket@postgres:5432/whaticket?sslmode=disable
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@whaticket.com}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Admin}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin}
    entrypoint: ["/app/seed"]
    restart: "no"

  backend:
    image: whaticket-go-backend:local
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    environment:
      BACKEND_LISTEN_ADDR: :8080
      DATABASE_URL: postgres://whaticket:whaticket@postgres:5432/whaticket?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me-32-bytes!!}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-jwt-refresh-secret-32-bytes!!}
      RABBITMQ_URL: amqp://whaticket:whaticket@rabbitmq:5672/
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      LOG_LEVEL: info
      APP_ENV: development
    ports:
      - "8080:8080"

  worker:
    build:
      context: ./worker-go
    image: whaticket-go-worker:local
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      RABBITMQ_URL: amqp://whaticket:whaticket@rabbitmq:5672/
      WORKER_S3_ENDPOINT: minio:9000
      WORKER_S3_ACCESS_KEY: minioadmin
      WORKER_S3_SECRET_KEY: minioadmin
      WORKER_S3_BUCKET: whaticket-media
      WORKER_S3_PUBLIC_URL: http://localhost:9000
      WORKER_S3_USE_SSL: "false"
      WORKER_SQLSTORE_PATH: /var/lib/worker-go/whatsmeow.db
      WORKER_PLATFORM_TYPE: DESKTOP
      WORKER_OS_NAME: whaticket-go-worker
      WORKER_HEALTH_PORT: "8081"
      LOG_LEVEL: info
      LOG_FORMAT: json
    volumes:
      - worker-data:/var/lib/worker-go
    ports:
      - "8081:8081"

  frontend:
    profiles: ["frontend"]
    build:
      context: ./frontend
      dockerfile: Dockerfile.go
    image: whaticket-frontend:local
    depends_on:
      backend:
        condition: service_started
    environment:
      VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:8080/}
      VITE_HOURS_CLOSE_TICKETS_AUTO: ${VITE_HOURS_CLOSE_TICKETS_AUTO:-}
    ports:
      - "3000:80"

volumes:
  postgres-data:
  rabbitmq-data:
  minio-data:
  worker-data:
