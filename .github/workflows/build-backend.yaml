name: Build backend

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/build-backend.yaml"
  push:
    branches: [develop]
    paths:
      - "backend/**"
      - ".github/workflows/build-backend.yaml"

concurrency:
  group: build-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: go build + vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: go vet
        run: go vet ./...

      - name: go build
        run: |
          go build -trimpath ./cmd/server
          go build -trimpath ./cmd/migrate
          go build -trimpath ./cmd/seed
